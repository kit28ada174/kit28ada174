<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#00D9FF"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#0099ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="0"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="200" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="200" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="200" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="750" y1="0" x2="750" y2="200" stroke="#00D9FF" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Glowing dots -->
  <circle cx="80" cy="50" r="2" fill="#00D9FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="820" cy="50" r="2" fill="#00D9FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="80" cy="150" r="2" fill="#00D9FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="820" cy="150" r="2" fill="#00D9FF" opacity="0.6" filter="url(#glow)"/>
  <circle cx="450" cy="30" r="3" fill="#00D9FF" opacity="0.4" filter="url(#glow)"/>
  <circle cx="200" cy="170" r="2" fill="#0099ff" opacity="0.5"/>
  <circle cx="700" cy="170" r="2" fill="#0099ff" opacity="0.5"/>
  <circle cx="350" cy="20" r="1.5" fill="#00D9FF" opacity="0.7"/>
  <circle cx="550" cy="180" r="1.5" fill="#00D9FF" opacity="0.7"/>

  <!-- Top wave -->
  <path d="M0,30 C150,10 300,50 450,25 C600,0 750,40 900,20 L900,0 L0,0 Z" fill="#00D9FF" opacity="0.15"/>
  <path d="M0,35 C150,15 300,55 450,30 C600,5 750,45 900,25 L900,0 L0,0 Z" fill="#00D9FF" opacity="0.08"/>

  <!-- Bottom wave -->
  <path d="M0,175 C150,195 300,160 450,180 C600,200 750,165 900,185 L900,200 L0,200 Z" fill="#00D9FF" opacity="0.15"/>
  <path d="M0,170 C150,190 300,155 450,175 C600,195 750,160 900,180 L900,200 L0,200 Z" fill="#00D9FF" opacity="0.08"/>

  <!-- Cyan accent line top -->
  <rect x="0" y="0" width="900" height="2" fill="url(#waveGrad)"/>
  <!-- Cyan accent line bottom -->
  <rect x="0" y="198" width="900" height="2" fill="url(#waveGrad)"/>

  <!-- Side accent bars -->
  <rect x="0" y="0" width="3" height="200" fill="#00D9FF" opacity="0.3"/>
  <rect x="897" y="0" width="3" height="200" fill="#00D9FF" opacity="0.3"/>

  <!-- Main name text with glow -->
  <text x="450" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800"
    text-anchor="middle" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="4">
    VAISHNAVY R
  </text>

  <!-- Subtitle -->
  <text x="450" y="130" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="400"
    text-anchor="middle" fill="#00D9FF" letter-spacing="1" opacity="0.9">
    AI &amp; Data Science  ·  Machine Learning  ·  Competitive Programming
  </text>

  <!-- Decorative dash lines around subtitle -->
  <line x1="80" y1="130" x2="220" y2="130" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="680" y1="130" x2="820" y2="130" stroke="#00D9FF" stroke-opacity="0.3" stroke-width="1"/>

  <!-- College tag -->
  <text x="450" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
    text-anchor="middle" fill="#ffffff" opacity="0.45" letter-spacing="1">
    KIT – Kalaignar Karunanidhi Institute of Technology, Coimbatore
  </text>

  <!-- Brackets decoration -->
  <text x="55" y="108" font-family="monospace" font-size="60" fill="#00D9FF" opacity="0.12">&lt;</text>
  <text x="818" y="108" font-family="monospace" font-size="60" fill="#00D9FF" opacity="0.12">/&gt;</text>
</svg>
